# Pack de configuração — conexão e identidade do app.
# Trocar o conteúdo desta pasta (settings.yml + dominio.md) re-aponta o sistema
# para outro banco. Requer restart do app.
app:
  nome: "KA Allocation"
  descricao: "Análise de alocação de supply por Key Account (Request/Deal/Retail, Score de priorização, WOI, rollover/rollback)"
database:
  # Qualquer URL SQLAlchemy. Caminho sqlite relativo é resolvido contra a raiz do projeto.
  # Segredos: use ${VAR} para interpolar variáveis de ambiente
  # (ex: "postgresql://user:${DB_PASS}@host:5432/db"). A env DATABASE_URL, se
  # definida, tem precedência total sobre esta URL.
  url: "sqlite:///allocation.db"
